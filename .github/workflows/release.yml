name: Automated Releases & Server Deployment

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ${{ github.event.repository.name }}

      # 1. Detect Branch for Release Status
      - name: Detect Branch & Set Destinations
        id: config
        run: |
          cd ${{ github.event.repository.name }}
          BRANCHES=$(git branch -r --contains ${{ github.ref_name }})
          
          if echo "$BRANCHES" | grep -q "origin/main"; then
            echo "target_branch=main" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          elif echo "$BRANCHES" | grep -q "origin/dev"; then
            echo "target_branch=dev" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "target_branch=${{ github.event.repository.default_branch }}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      # 2. Generate Release Notes
      - name: Generate Release Notes
        id: release-notes
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.payload.ref.replace('refs/tags/', ''),
              target_commitish: '${{ steps.config.outputs.target_branch }}'
            });
            core.setOutput('body', response.data.body);

      # 3. Create the GitHub Release
      - name: Create Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.payload.ref.replace('refs/tags/', ''),
              target_commitish: '${{ steps.config.outputs.target_branch }}',
              name: context.payload.ref.replace('refs/tags/', ''),
              body: `${{ steps.release-notes.outputs.body }}`,
              draft: false,
              prerelease: ${{ steps.config.outputs.is_prerelease }}
            });

      # 4. Securely Copy Files to /home/dune/
      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "${{ github.event.repository.name }}"
          target: "/home/dune/"
          strip_components: 0

      # 5. Stop running containers, pull updates, and bring them back up
      - name: Manage Docker Containers via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/dune/${{ github.event.repository.name }}
            
            echo "Stopping existing containers if they are running..."
            docker compose down
            
            echo "Starting containers with new configuration..."
            docker compose up -d
